name: Build AppImage
on:
  workflow_dispatch:
  schedule:
    - cron: "5 */12 * * *"
  push:
    branches:
      - "main"

jobs:
  version:
    name: Kiro AppImage
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      METADATA_URL: https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json
    steps:
      - uses: actions/checkout@main
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libfuse2 imagemagick
      - name: Resolve latest Kiro release
        id: release
        run: |
          metadata="$(curl -fsSL "$METADATA_URL")"
          version="$(jq -r '.currentRelease' <<<"$metadata")"
          package_url="$(jq -r '.releases[].updateTo.url | select(endswith(".tar.gz"))' <<<"$metadata" | head -n 1)"

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Unable to determine currentRelease from metadata" >&2
            exit 1
          fi

          if [[ -z "$package_url" || "$package_url" == "null" ]]; then
            echo "Unable to determine package tarball URL from metadata" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package_url=$package_url" >> "$GITHUB_OUTPUT"

      - name: Build
        id: build
        uses: valicm/appimage-bash@main
        with:
          version_url: ${{ steps.release.outputs.package_url }}
          version_file: 'resources/app/package.json'
          version_bash: 'jq -r  .version'
          version_icon: 'code.png'
      - name: Upload artifact
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.APP_SHORT_NAME }}.AppImage
          path: 'dist'
      - name: Release
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: ${{ env.APP_NAME }} AppImage ${{ env.APP_VERSION }}
          automatic_release_tag: ${{ env.APP_VERSION }}
          prerelease: false
          files: |
            dist/
          repo_token: ${{ secrets.GITHUB_TOKEN }}
