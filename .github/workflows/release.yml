name: Build AppImage
on:
  workflow_dispatch:
  schedule:
    - cron: "5 */12 */4 * *"
  push:
    branches:
      - "main"

jobs:
  version:
    name: Kiro AppImage
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      METADATA_URL: https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libfuse2 imagemagick
      - name: Resolve latest Kiro release
        id: release
        run: |
          metadata="$(curl -fsSL "$METADATA_URL")"
          version="$(jq -r '.currentRelease' <<<"$metadata")"
          package_url="$(jq -r '.releases[].updateTo.url | select(endswith(".tar.gz"))' <<<"$metadata" | head -n 1)"

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Unable to determine currentRelease from metadata" >&2
            exit 1
          fi

          if [[ -z "$package_url" || "$package_url" == "null" ]]; then
            echo "Unable to determine package tarball URL from metadata" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package_url=$package_url" >> "$GITHUB_OUTPUT"

      - name: Prepare upstream package for AppImage build
        id: prep
        run: |
          set -euo pipefail
          # download upstream tarball and extract into repository path expected by the build action
          tmp_tar="$(mktemp /tmp/kiro.XXXXXX.tar.gz)"
          echo "Downloading upstream package from: ${{ steps.release.outputs.package_url }}"
          curl -fL -o "$tmp_tar" "${{ steps.release.outputs.package_url }}"

          # remove any existing Kiro dir and extract fresh contents
          if [ -d "Kiro" ]; then
            rm -rf "Kiro"
          fi
          mkdir -p "Kiro"
          tar -xzf "$tmp_tar" -C "Kiro" --strip-components=1
          rm -f "$tmp_tar"

          # sanity checks: ensure product.json exists and the icon is present
          if [ ! -f "resources/app/product.json" ]; then
            echo "Error: product.json not found at resources/app/product.json" >&2
            ls -la Kiro || true
            exit 1
          fi

          if [ ! -f "resources/app/resources/linux/code.png" ]; then
            echo "Warning: expected icon not found at Kiro/resources/app/resources/linux/code.png" >&2
          fi

          # ensure binaries are executable and resources readable
          chmod -R a+rX Kiro || true
      - name: Build
        id: build
        uses: valicm/appimage-bash@main
        with:
          version_url: ${{ steps.release.outputs.package_url }}
          version_file: "resources/app/product.json"
          version_bash: "jq -r .version"
          version_icon: "code.png"
          version_check: "verify"
      - name: Upload artifact
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_SHORT_NAME }}.AppImage
          path: "dist"
      - name: Release
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: ${{ env.APP_NAME }} AppImage ${{ env.APP_VERSION }}
          automatic_release_tag: latest
          prerelease: false
          files: |
            dist/
          repo_token: ${{ secrets.GITHUB_TOKEN }}
